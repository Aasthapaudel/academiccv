name: Deploy Nuxt to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Nuxt site
        run: npm run generate

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: YOUR_SERVER_IP       # <-- replace here
          username: YOUR_SERVER_USER # <-- replace here
          password: YOUR_SERVER_PASS # <-- replace here
          source: ".output/public/*"
          target: "/var/www/html/academiccv"